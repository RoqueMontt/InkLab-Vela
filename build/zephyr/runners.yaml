# Available runners configured by board.cmake.
runners:
- stm32cubeprogrammer
- openocd
- pyocd
- jlink

# Default flash runner if --runner is not given.
flash-runner: stm32cubeprogrammer

# Default debug runner if --runner is not given.
debug-runner: openocd

# Common runner configuration values.
config:
  board_dir: C:/Users/broqu/Desktop/InkLabSW/InkLab-Vela/zephyr/boards/arm/nucleo_g0b1re
  # Build outputs:
  elf_file: zephyr.elf
  hex_file: zephyr.hex
  bin_file: zephyr.bin
  # Host tools:
  gdb: C:/ncs/toolchains/fd21892d0f/opt/zephyr-sdk/arm-zephyr-eabi/bin/arm-zephyr-eabi-gdb.exe
  openocd: C:/oss-cad-suite/bin/openocd.exe
  openocd_search:
    - C:\Program Files/OpenOCD/share/openocd/scripts

# Runner specific arguments
args:
  stm32cubeprogrammer:
    - --port=swd
    - --reset-mode=hw
  openocd:
    - --cmd-load
    - flash write_image erase
    - --cmd-verify
    - verify_image
  pyocd:
    - --dt-flash=y
    - --target=stm32g071rbtx
    - --flash-opt=-O reset_type=hw
    - --flash-opt=-O connect_mode=under-reset
  jlink:
    - --dt-flash=y
    - --device=STM32G0B1RE
    - --speed=4000
