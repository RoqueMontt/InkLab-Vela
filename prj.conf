# ── GPIO / I2C ──────────────────────────────────────────────────
CONFIG_GPIO=y
CONFIG_I2C=y

# ── SPI + DMA ───────────────────────────────────────────────────
CONFIG_SPI=y
CONFIG_SPI_STM32=y
CONFIG_DMA=y
CONFIG_DMA_STM32=y
CONFIG_SPI_STM32_DMA=y
CONFIG_SPI_ASYNC=y


# ── Pinctrl ─────────────────────────────────────────────────────
CONFIG_PINCTRL=y

# ── ADC ─────────────────────────────────────────────────────────
CONFIG_ADC=y

# ── USB CDC ACM Console ──────────────────────────────────────────
CONFIG_USB_DEVICE_STACK=y
CONFIG_USB_DEVICE_PRODUCT="InkLab-Vela"
CONFIG_USB_DEVICE_VID=0x1209
CONFIG_USB_DEVICE_PID=0x0001
CONFIG_USB_CDC_ACM=y

CONFIG_SERIAL=y
CONFIG_CONSOLE=n
CONFIG_UART_CONSOLE=n
CONFIG_UART_LINE_CTRL=y
CONFIG_UART_INTERRUPT_DRIVEN=y
CONFIG_PRINTK=y


# Don't let the console block the system if the USB cable isn't "ready"
CONFIG_UART_LINE_CTRL=y
CONFIG_USB_CDC_ACM_LOG_LEVEL_OFF=y



# ── Printf / float support ───────────────────────────────────────
CONFIG_CBPRINTF_FP_SUPPORT=y

# ── File system: FAT32 + exFAT ───────────────────────────────────
CONFIG_SDHC=y
CONFIG_DISK_ACCESS=y
CONFIG_FILE_SYSTEM=y
CONFIG_FAT_FILESYSTEM_ELM=y
CONFIG_FS_FATFS_EXFAT=y
CONFIG_FS_FATFS_LFN_MODE_HEAP=y
CONFIG_HEAP_MEM_POOL_SIZE=4096

# ── Threading ────────────────────────────────────────────────────
CONFIG_MULTITHREADING=y
CONFIG_NUM_PREEMPT_PRIORITIES=16
CONFIG_NUM_COOP_PRIORITIES=2
CONFIG_THREAD_NAME=y
CONFIG_THREAD_MONITOR=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_STACK_SENTINEL=y

CONFIG_THREAD_ANALYZER=y
CONFIG_THREAD_ANALYZER_USE_PRINTK=y
CONFIG_THREAD_ANALYZER_AUTO=n

# ── MCUboot / OTA ────────────────────────────────────────────────
CONFIG_BOOTLOADER_MCUBOOT=n
CONFIG_IMG_MANAGER=y
CONFIG_MCUBOOT_IMG_MANAGER=n
CONFIG_STREAM_FLASH=y               
CONFIG_IMG_BLOCK_BUF_SIZE=4096 
CONFIG_FLASH=y
CONFIG_FLASH_MAP=y

# ── Power management ─────────────────────────────────────────────


# ── Reboot ───────────────────────────────────────────────────────
CONFIG_REBOOT=y